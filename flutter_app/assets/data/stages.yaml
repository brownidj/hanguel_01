  - id: stage_09_double_consonants
    name: "Tense consonants: ㄲ ㄸ ㅃ ㅆ ㅉ"
    description: "Introduce ㄲ ㄸ ㅃ ㅆ ㅉ."
    adds:
      vowels: []
      consonants: ["ㄲ", "ㄸ", "ㅃ", "ㅆ", "ㅉ"]
    allow_modes:
      vowels: false
      consonants: true
      syllables: true
    syllable_policy: "cv_all"
    mastery_gate:
      type: full_cycles
