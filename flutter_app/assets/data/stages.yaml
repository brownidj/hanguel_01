  - id: stage_10_aspirated_consonants
    name: "Aspirated consonants review"
    description: "Review aspirated contrasts with expanded vowels."
    adds:
      vowels: []
      consonants: []
    review_pool:
      vowels: ["ㅏ","ㅓ","ㅗ","ㅜ","ㅡ","ㅣ","ㅐ","ㅔ","ㅚ","ㅟ","ㅑ","ㅕ","ㅛ","ㅠ","ㅒ","ㅖ"]
      consonants: ["ㄱ","ㄴ","ㄷ","ㄹ","ㅁ","ㅂ","ㅅ","ㅇ","ㅈ","ㅎ","ㅋ","ㅌ","ㅍ","ㅊ","ㄲ","ㄸ","ㅃ","ㅆ","ㅉ"]
    allow_modes:
      vowels: false
      consonants: true
      syllables: true
    syllable_policy: "cv_all"
    mastery_gate:
