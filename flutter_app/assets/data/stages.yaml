  - id: stage_11_full_review
    name: "Full review"
    description: "Review all introduced vowels and consonants."
    adds:
      vowels: []
      consonants: []
    allow_modes:
      vowels: true
      consonants: true
      syllables: true
    syllable_policy: "cv_all"
    mastery_gate:
      type: full_cycles
      cycles: 3

    review_offer:
      allow_include_previous: true
      label: "Review earlier items?"
    recommended_settings:
      repeats: 1
      delay_between_reps_ms: 400
      delay_before_hints_ms: 200
      delay_before_extras_ms: 400
      wpm: 120
